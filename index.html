<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个网站</title>

    <!-- 简短描述，有利于 SEO 与分享卡片 -->
    <meta name="description" content="个人主页 — 在这里展示我的项目、博客与作品集。">

    <!-- 轻量 favicon，使用 data: URI 避免额外网络请求 -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23007ACC'/%3E%3Ctext x='50' y='60' font-size='50' text-anchor='middle' fill='white' font-family='Arial,sans-serif'%3EZ%3C/text%3E%3C/svg%3E">

    <!-- 主题颜色（移动浏览器工具栏） -->
    <meta name="theme-color" content="#007acc">

    <!-- 结构化数据（简单的 Website/Person，有助于搜索引擎理解） -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "我的第一个网站",
      "url": "https://zhu-liya.github.io/Profile"
    }
    </script>

    <!-- 关键/首屏 CSS 内联（非常小的样式，内联能避免额外阻塞请求） -->
    <style>
        :root{--max-width:800px;--gap:20px;--accent:#007acc}
        html,body{height:100%}
        body {
            font-family: Arial, sans-serif;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: var(--gap);
            line-height:1.5;
            color:#111;
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
        }
        header, main, footer{display:block}
        .container{text-align:center}
        h1{font-size:1.6rem;margin:0 0 .5rem}
        p{margin:.4rem 0;color:#333}
        /* 可访问性的跳过链接，仅在焦点时显示 */
        .skip-link{
            position:absolute;left:0;top:-40px;background:#000;color:#fff;padding:8px 12px;z-index:100;
            transition:top .2s;
        }
        .skip-link:focus{top:10px}
        /* 响应式：小屏时加大字体可读性 */
        @media (max-width:480px){
            body{padding:16px}
            h1{font-size:1.25rem}
        }
    </style>
</head>
<body>
    <!-- 跳过链接提升键盘/屏幕阅读器可访问性 -->
    <a class="skip-link" href="#main">跳到主要内容</a>

    <header class="container" role="banner" aria-label="站点头部">
        <!-- 如果以后加入 logo，可直接放在这里（SVG inline 推荐） -->
    </header>

    <main id="main" class="container" role="main" aria-labelledby="title">
        <h1 id="title">🎉 恭喜！你的网站上线了！</h1>
        <p>这是用 GitHub Pages 搭建的免费个人网站</p>
        <p>以后可以在这里展示你的项目、博客和作品集</p>
    </main>

    <footer class="container" role="contentinfo" aria-label="页脚">
        <p style="font-size:0.9rem;color:#666;margin-top:1.2rem">© 2026 zhu-liya</p>
    </footer>
</body>
</html>
